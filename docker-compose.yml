services:
  directus:
    image: directus/directus:11.8.0
    container_name: archibuild-directus
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    environment:
      SECRET: "${DIRECTUS_SECRET}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD}"
      PUBLIC_URL: "${PUBLIC_URL}"
      DB_CLIENT: "${DIRECTUS_DB_CLIENT:-sqlite3}"
      DB_FILENAME: "${DIRECTUS_DB_FILENAME:-/directus/database/data.db}"
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
    volumes:
      - ./cms/uploads:/directus/uploads
      - ./cms/data:/directus/database
    restart: unless-stopped
